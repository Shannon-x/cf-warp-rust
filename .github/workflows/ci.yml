name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: rustfmt --edition 2021 --check src/main.rs tests/*.rs

      - name: cargo fmt (vendored forks)
        run: rustfmt --edition 2021 --check vendor/wireguard-netstack/src/netstack.rs vendor/warp-wireguard-gen/src/api.rs

      - name: cargo clippy
        run: cargo clippy --all-targets --release --locked -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo build --release
        run: cargo build --release --locked
