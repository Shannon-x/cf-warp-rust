name: release

# Linux 二进制发布——优先级最高，最快路径。
# macOS 二进制由 release-macos.yml 异步追加到同一个 GitHub Release。
# 拆分原因：macOS runner（尤其 macos-13）排队常超过 10 分钟，会拖累 Linux
# 二进制的发布；而 99% 的部署场景都是 Linux 服务器。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布标签'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write
  packages: read

concurrency:
  group: release-linux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 musl — ubuntu-latest 原生
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
          # Linux aarch64 musl — GitHub 2025 公开提供的 ARM 原生 runner
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          NAME="warp-rust-${TAG}-${{ matrix.target }}"
          mkdir -p dist "$NAME"
          cp "target/${{ matrix.target }}/release/warp-rust" "$NAME/"
          cp README.md LICENSE SECURITY.md config.toml.example "$NAME/"
          mkdir -p "$NAME/scripts"
          cp scripts/*.sh "$NAME/scripts/"
          chmod +x "$NAME/scripts/"*.sh "$NAME/warp-rust"
          tar czf "dist/${NAME}.tar.gz" "$NAME"
          sha256sum "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
          ls -la dist/
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release (linux)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          # 关键：append_body=true 让 release-macos.yml 之后能追加文件
          # 而不覆盖这里已经写好的 release body
          append_body: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## warp-rust ${{ github.ref_name }}

            通过 Cloudflare WARP 出口的 SOCKS5 + UDP ASSOCIATE 代理。

            ### 一键启动（Linux）

            ```bash
            # x86_64
            curl -sSL -O https://github.com/Shannon-x/cf-warp-rust/releases/download/${{ github.ref_name }}/warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
            tar xzf warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
            cd warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl

            # 本机自用，无密码
            ./scripts/run-binary.sh

            # 对外暴露，自动生成强密码
            ./scripts/run-binary.sh 1080 --expose
            ```

            ### 容器镜像（多架构）

            ```bash
            docker pull ghcr.io/shannon-x/cf-warp-rust:${{ github.ref_name }}
            # 或 :latest
            ```

            ### 产物清单

            | 平台 | 文件 |
            | --- | --- |
            | Linux x86_64（musl，静态链接） | `warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux aarch64（musl，ARM 服务器/树莓派） | `warp-rust-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz` |
            | Docker | `ghcr.io/shannon-x/cf-warp-rust:${{ github.ref_name }}` |

            macOS 预编译二进制由独立的 `release-macos` workflow 异步发布到本页面，
            通常会在 Linux 发布后几分钟到半小时内追加。

            ### 变更摘要
