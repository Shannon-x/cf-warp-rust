name: release

# 常用二进制平台发布——Linux x86_64/aarch64 (musl 静态) + Windows x86_64。
# 全部用原生 runner，build 完直接 publish GitHub Release。
# macOS（仅 Apple Silicon）由 release-macos.yml 异步追加。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布标签'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            kind: linux
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-24.04-arm
            kind: linux
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            kind: windows
            archive: zip
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          NAME="warp-rust-${TAG}-${{ matrix.target }}"
          mkdir -p dist "$NAME"
          cp "target/${{ matrix.target }}/release/warp-rust" "$NAME/"
          cp README.md LICENSE SECURITY.md config.toml.example "$NAME/"
          mkdir -p "$NAME/scripts"
          cp scripts/*.sh "$NAME/scripts/"
          chmod +x "$NAME/scripts/"*.sh "$NAME/warp-rust"
          tar czf "dist/${NAME}.tar.gz" "$NAME"
          sha256sum "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
          ls -la dist/

      - name: Package (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = "${{ inputs.tag }}"
          }
          $name = "warp-rust-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist", $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/warp-rust.exe" "$name/"
          Copy-Item README.md, LICENSE, SECURITY.md, config.toml.example "$name/"
          # scripts/ 在 Windows 下不可执行（git-bash 用户可以跑，PowerShell 用户读 README）
          New-Item -ItemType Directory -Force -Path "$name/scripts" | Out-Null
          Copy-Item scripts/*.sh "$name/scripts/"
          Compress-Archive -Path "$name" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ASCII "dist/$name.zip.sha256"
          Get-ChildItem dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warp-rust-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## warp-rust ${{ github.ref_name }}

            通过 Cloudflare WARP 出口的 SOCKS5 + UDP ASSOCIATE 代理。

            ### 一键启动（Linux）

            ```bash
            curl -sSL -O https://github.com/Shannon-x/cf-warp-rust/releases/download/${{ github.ref_name }}/warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
            tar xzf warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
            cd warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl

            ./scripts/run-binary.sh                    # 本机自用，无密码
            ./scripts/run-binary.sh 1080 --expose      # 对外暴露，自动生成强密码
            ```

            ### 容器镜像（多架构）

            ```bash
            docker pull ghcr.io/shannon-x/cf-warp-rust:${{ github.ref_name }}
            # 或 :latest
            ```

            ### Windows 启动

            ```powershell
            # 解压后
            cd warp-rust-${{ github.ref_name }}-x86_64-pc-windows-msvc
            cp config.toml.example config.toml
            .\warp-rust.exe --config config.toml
            ```

            ### 产物清单

            | 平台 | 文件 |
            | --- | --- |
            | Linux x86_64（musl 静态链接，任意发行版） | `*-x86_64-unknown-linux-musl.tar.gz` |
            | Linux aarch64（musl 静态，ARM 服务器/树莓派） | `*-aarch64-unknown-linux-musl.tar.gz` |
            | Windows x86_64（MSVC） | `*-x86_64-pc-windows-msvc.zip` |
            | macOS Apple Silicon（M 系列） | `*-aarch64-apple-darwin.tar.gz` ⏳ 由 release-macos 异步追加 |
            | Docker 镜像 | `ghcr.io/shannon-x/cf-warp-rust:${{ github.ref_name }}` |

            老旧平台（macOS Intel、Linux glibc 等）按需用 `cargo build --release` 自行编译。

            ### 变更摘要
