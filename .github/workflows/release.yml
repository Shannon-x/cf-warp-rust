name: release

# 多平台预编译二进制。Linux 用原生 runner（amd64/arm64 各自 ubuntu-*）+ musl
# 静态链接；macOS 用对应原生 runner。完全不用 cross / QEMU 模拟，速度快。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布标签（仅 workflow_dispatch）'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 musl — ubuntu-latest 原生
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            kind: linux
          # Linux aarch64 musl — GitHub 2025 公开提供的 ARM 原生 runner
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-24.04-arm
            kind: linux
          # macOS Intel
          - target: x86_64-apple-darwin
            runs-on: macos-13
            kind: macos
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            kind: macos
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          NAME="warp-rust-${TAG}-${{ matrix.target }}"
          mkdir -p dist "$NAME"
          cp "target/${{ matrix.target }}/release/warp-rust" "$NAME/"
          cp README.md LICENSE SECURITY.md config.toml.example "$NAME/"
          mkdir -p "$NAME/scripts"
          cp scripts/*.sh "$NAME/scripts/"
          chmod +x "$NAME/scripts/"*.sh "$NAME/warp-rust"
          tar czf "dist/${NAME}.tar.gz" "$NAME"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          fi
          ls -la dist/
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## warp-rust ${{ github.ref_name }}

            通过 Cloudflare WARP 出口的 SOCKS5 + UDP ASSOCIATE 代理。

            ### 一键启动

            ```bash
            # 解压（以 Linux x86_64 为例）
            tar xzf warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
            cd warp-rust-${{ github.ref_name }}-x86_64-unknown-linux-musl

            # 本机自用（无密码）
            ./scripts/run-binary.sh

            # 对外暴露（自动生成强密码）
            ./scripts/run-binary.sh 1080 --expose
            ```

            ### 容器镜像（多架构）

            ```bash
            docker pull ghcr.io/shannon-x/cf-warp-rust:${{ github.ref_name }}
            # 或 :latest
            ```

            详细使用方式见 [README](https://github.com/Shannon-x/cf-warp-rust#readme) 与 [SECURITY.md](https://github.com/Shannon-x/cf-warp-rust/blob/main/SECURITY.md)。

            ### 变更摘要
