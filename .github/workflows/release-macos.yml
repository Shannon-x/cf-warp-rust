name: release-macos

# 异步构建 macOS 二进制（仅 Apple Silicon），追加到现有 GitHub Release。
# 拆出来的原因：macOS runner 排队不可控；不让它阻塞 Linux/Windows 发布。
# 老 Intel Mac 不再支持——按需自己 `cargo build --release`。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布标签'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (aarch64-apple-darwin)
    runs-on: macos-latest    # GitHub 默认 macos-latest = Apple Silicon (M 系列)
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          NAME="warp-rust-${TAG}-aarch64-apple-darwin"
          mkdir -p dist "$NAME"
          cp "target/aarch64-apple-darwin/release/warp-rust" "$NAME/"
          cp README.md LICENSE SECURITY.md config.toml.example config.toml.docker.example "$NAME/"
          mkdir -p "$NAME/scripts"
          cp scripts/*.sh "$NAME/scripts/"
          chmod +x "$NAME/scripts/"*.sh "$NAME/warp-rust"
          tar czf "dist/${NAME}.tar.gz" "$NAME"
          (cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          ls -la dist/

      - name: Append to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          # 不重新生成 release body，只追加文件
          append_body: false
          draft: false
